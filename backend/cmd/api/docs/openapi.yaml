openapi: 3.0.3
info:
  title: Biblios API
  description: Personal & Cooperative Library Management System
  version: 1.0.0
  contact:
    name: Biblios Team

servers:
  - url: http://localhost:8081/api/v1
    description: Local development

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    MessageResponse:
      type: object
      properties:
        message:
          type: string

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        username:
          type: string
        role:
          type: string
          enum: [user, moderator, admin]
        bio:
          type: string
        avatar_url:
          type: string
          format: uri
        theme:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: '#/components/schemas/User'

    RegisterRequest:
      type: object
      required: [email, username, password]
      properties:
        email:
          type: string
          format: email
        username:
          type: string
          minLength: 3
        password:
          type: string
          minLength: 8

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    UpdateProfileRequest:
      type: object
      properties:
        username:
          type: string
        bio:
          type: string
          maxLength: 500
        avatar_url:
          type: string
          format: uri

    UpdateEmailRequest:
      type: object
      required: [email, current_password]
      properties:
        email:
          type: string
          format: email
        current_password:
          type: string

    UpdatePasswordRequest:
      type: object
      required: [current_password, new_password]
      properties:
        current_password:
          type: string
        new_password:
          type: string
          minLength: 8

    UpdateThemeRequest:
      type: object
      required: [theme]
      properties:
        theme:
          type: string

    Author:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        status:
          type: string
          enum: [pending, approved, rejected]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Genre:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        status:
          type: string
          enum: [pending, approved, rejected]
        created_at:
          type: string
          format: date-time

    Edition:
      type: object
      properties:
        id:
          type: string
          format: uuid
        book_id:
          type: string
          format: uuid
        format:
          type: string
          enum: [hardcover, paperback, ebook, audiobook]
        isbn:
          type: string
        language:
          type: string
        publisher:
          type: string
        published_at:
          type: string
          format: date
        page_count:
          type: integer
        status:
          type: string
          enum: [pending, approved, rejected]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Book:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        cover_url:
          type: string
          format: uri
        status:
          type: string
          enum: [pending, approved, rejected]
        authors:
          type: array
          items:
            $ref: '#/components/schemas/Author'
        genres:
          type: array
          items:
            $ref: '#/components/schemas/Genre'
        editions:
          type: array
          items:
            $ref: '#/components/schemas/Edition'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    PaginatedBooks:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        items:
          type: array
          items:
            $ref: '#/components/schemas/Book'

    SubmitBookRequest:
      type: object
      required: [title, format]
      properties:
        title:
          type: string
        description:
          type: string
        cover_url:
          type: string
          format: uri
        authors:
          type: array
          items:
            type: string
        genres:
          type: array
          items:
            type: string
        format:
          type: string
          enum: [hardcover, paperback, ebook, audiobook]
        isbn:
          type: string
        language:
          type: string
        publisher:
          type: string
        published_at:
          type: string
          format: date
        page_count:
          type: integer

    UpdateBookRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        cover_url:
          type: string
          format: uri
        authors:
          type: array
          items:
            type: string
        genres:
          type: array
          items:
            type: string

    AddCopyRequest:
      type: object
      required: [edition_id, reading_status]
      properties:
        edition_id:
          type: string
          format: uuid
        reading_status:
          type: string
          enum: [want_to_read, reading, read]
        condition:
          type: string

    UpdateReadingStatusRequest:
      type: object
      required: [reading_status]
      properties:
        reading_status:
          type: string
          enum: [want_to_read, reading, read]

    UserBook:
      type: object
      properties:
        copy_id:
          type: string
          format: uuid
        reading_status:
          type: string
          enum: [want_to_read, reading, read]
        condition:
          type: string
        added_at:
          type: string
          format: date-time
        edition_id:
          type: string
          format: uuid
        format:
          type: string
        language:
          type: string
        book:
          $ref: '#/components/schemas/Book'

    LookupResult:
      type: object
      properties:
        title:
          type: string
        authors:
          type: array
          items:
            type: string
        isbn:
          type: string
        isbn_10:
          type: string
        isbn_13:
          type: string
        publisher:
          type: string
        published_date:
          type: string
        page_count:
          type: integer
        cover_url:
          type: string
          format: uri
        language:
          type: string
        description:
          type: string
        categories:
          type: array
          items:
            type: string

    Submission:
      type: object
      properties:
        id:
          type: string
          format: uuid
        submitted_by:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, approved, rejected]
        rejection_reason:
          type: string
        reviewed_by:
          type: string
          format: uuid
        reviewed_at:
          type: string
          format: date-time
        book_id:
          type: string
          format: uuid
        edition_id:
          type: string
          format: uuid
        copy_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    PaginatedSubmissions:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        items:
          type: array
          items:
            $ref: '#/components/schemas/Submission'

    RejectRequest:
      type: object
      required: [reason]
      properties:
        reason:
          type: string

    EditAndApproveRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        cover_url:
          type: string
          format: uri
        authors:
          type: array
          items:
            type: string
        genres:
          type: array
          items:
            type: string
        format:
          type: string
          enum: [hardcover, paperback, ebook, audiobook]
        isbn:
          type: string
        language:
          type: string
        publisher:
          type: string
        published_at:
          type: string
          format: date
        page_count:
          type: integer

paths:
  # ─── AUTH ───────────────────────────────────────────────────────────────────

  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Email or username already taken
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      tags: [Auth]
      summary: Login and receive JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current authenticated user
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout and revoke token
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Logged out successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ─── USERS ──────────────────────────────────────────────────────────────────

  /users/me:
    put:
      tags: [Users]
      summary: Update profile fields (username, bio, avatar)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Username already in use
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: No fields provided or validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags: [Users]
      summary: Delete own account
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Account deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/me/email:
    put:
      tags: [Users]
      summary: Update email address (requires current password)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEmailRequest'
      responses:
        '200':
          description: Email updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized or wrong current password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Email already in use
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/me/password:
    put:
      tags: [Users]
      summary: Update password
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePasswordRequest'
      responses:
        '200':
          description: Password updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          description: Unauthorized or current password incorrect
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/me/theme:
    put:
      tags: [Users]
      summary: Update user theme preference
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateThemeRequest'
      responses:
        '200':
          description: Theme updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Invalid theme
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ─── BOOKS ──────────────────────────────────────────────────────────────────

  /books:
    get:
      tags: [Books]
      summary: List approved books (paginated)
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: q
          in: query
          description: Search query
          schema:
            type: string
      responses:
        '200':
          description: Paginated list of books
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedBooks'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags: [Books]
      summary: Submit a new book for moderation
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitBookRequest'
      responses:
        '201':
          description: Book submitted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Submission'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /books/lookup:
    get:
      tags: [Books]
      summary: Lookup book metadata via external APIs
      security:
        - BearerAuth: []
      parameters:
        - name: q
          in: query
          description: Title or author search query
          schema:
            type: string
        - name: isbn
          in: query
          description: ISBN-10 or ISBN-13
          schema:
            type: string
      responses:
        '200':
          description: Lookup results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LookupResult'
        '400':
          description: Missing query parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /books/check:
    get:
      tags: [Books]
      summary: Check if a book with a given ISBN already exists
      security:
        - BearerAuth: []
      parameters:
        - name: isbn
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Duplicate check result
          content:
            application/json:
              schema:
                type: object
                properties:
                  exists:
                    type: boolean
                  book:
                    $ref: '#/components/schemas/Book'
        '400':
          description: Missing isbn parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /books/{id}:
    get:
      tags: [Books]
      summary: Get a book by ID with authors, genres, and editions
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Book details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Book not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags: [Books]
      summary: Update a book (moderator/admin only)
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBookRequest'
      responses:
        '200':
          description: Book updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden — moderator or admin role required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Book not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags: [Books]
      summary: Soft delete a book (moderator/admin only)
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Book deleted
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Book not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ─── COPIES ─────────────────────────────────────────────────────────────────

  /books/copies:
    post:
      tags: [Copies]
      summary: Add a copy of an existing edition to your library
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddCopyRequest'
      responses:
        '201':
          description: Copy added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserBook'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /books/copies/{id}/status:
    put:
      tags: [Copies]
      summary: Update reading status of a copy
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateReadingStatusRequest'
      responses:
        '200':
          description: Reading status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserBook'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Copy not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /books/copies/{id}:
    delete:
      tags: [Copies]
      summary: Remove a copy from your library (soft delete)
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Copy removed
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Copy not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ─── USER LIBRARY ────────────────────────────────────────────────────────────

  /users/me/books:
    get:
      tags: [Library]
      summary: Get current user's books (simple list)
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of user's books
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserBook'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/me/library:
    get:
      tags: [Library]
      summary: Get current user's full library with reading status
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          description: Filter by reading status
          schema:
            type: string
            enum: [want_to_read, reading, read]
      responses:
        '200':
          description: User's library
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserBook'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ─── MODERATION ─────────────────────────────────────────────────────────────

  /moderation/submissions:
    get:
      tags: [Moderation]
      summary: List pending submissions (moderator/admin only)
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated list of pending submissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedSubmissions'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /moderation/submissions/{id}:
    get:
      tags: [Moderation]
      summary: Get a single submission (moderator/admin only)
      security:
        - BearerAuth: []
